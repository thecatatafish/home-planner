<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Home Planner{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <span class="nav-logo-icon">🏠</span>
      <span class="nav-logo-name">Home Planner</span><span class="nav-logo-sub"> / Meals</span>
    </a>
    <a href="/recipes" class="nav-link {% if active == 'recipes' %}active{% endif %}">Recipes</a>
    <a href="/planner" class="nav-link {% if active == 'planner' %}active{% endif %}">Week Planner</a>
    <a href="/shopping-list" class="nav-link {% if active == 'shopping' %}active{% endif %}">Shopping List</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
